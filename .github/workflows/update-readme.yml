name: Auto Update README

on:
  push:
    branches: [main]
    paths-ignore: ["README.md"]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tree command
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Generate and replace directory structure
        run: |
          # 1. 生成目录树到临时文件
          tree --dirsfirst --noreport -I ".git|.github|node_modules|__pycache__" -L 4 > temp_dir.md

          # 2. 用 awk 安全地替换 README 中的目录结构
          awk '
            BEGIN { in_dir=0 }
            /^## 目录结构$/ {
              print;
              print "```";
              while ((getline line < "temp_dir.md") > 0) print line;
              close("temp_dir.md");
              print "```";
              in_dir=1;
              next;
            }
            in_dir && /^```$/ { in_dir=0; next; }
            !in_dir { print }
          ' README.md > README.tmp && mv README.tmp README.md

          # 3. 删除临时文件
          rm -f temp_dir.md

      - name: Update last modified time
        run: |
          CURRENT_DATE=$(date +"%Y-%m-%d")
          sed -i "s/📅 最后更新：.*/📅 最后更新：$CURRENT_DATE/" README.md

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet README.md; then
            echo "README 无需更新，跳过提交"
          else
            git add README.md
            git commit -m "chore: auto update README (directory + update time)"
            git push
          fi